    <header>
        <div style="display:flex;align-items:center;gap:12px;">
            <div class="logo">
                <svg class="logo-svg" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="32" cy="32" r="12" fill="#FFA500"/>
                    <g stroke="#FFA500" stroke-width="4">
                        <line x1="32" y1="0" x2="32" y2="12"/>
                        <line x1="32" y1="52" x2="32" y2="64"/>
                        <line x1="0" y1="32" x2="12" y2="32"/>
                        <line x1="52" y1="32" x2="64" y2="32"/>
                        <line x1="10" y1="10" x2="18" y2="18"/>
                        <line x1="46" y1="46" x2="54" y2="54"/>
                        <line x1="10" y1="54" x2="18" y2="46"/>
                        <line x1="46" y1="18" x2="54" y2="10"/>
                    </g>
                </svg>
            </div>
            <h1 style="margin:0;">SolarTech Solutions - Get a Quote</h1>
        </div>
    </header>
    <nav class="top-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="installations.html">Installations</a>
        <a href="gallery.html">Gallery</a>
        <a href="stories.html">Stories</a>

        <a href="contact.html">Contact</a>
    </nav>
    <main>
        <h2 class="section-title">Request a Free Solar Quote</h2>
        <form action="#" method="post">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Phone *</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="address">Property Address *</label>
            <input type="text" id="address" name="address" required>

            <label for="property-type">Property Type *</label>
            <select id="property-type" name="property-type" required>
                <option value="">Select...</option>
                <option value="residential">Residential</option>
                <option value="commercial">Commercial</option>
                <option value="industrial">Industrial</option>
            </select>

            <label for="roof-type">Roof Type</label>
            <select id="roof-type" name="roof-type">
                <option value="">Select...</option>
                <option value="asphalt">Asphalt Shingle</option>
                <option value="metal">Metal</option>
                <option value="tile">Tile</option>
                <option value="flat">Flat</option>
                <option value="other">Other</option>
            </select>

            <label for="monthly-bill">Average Monthly Electric Bill *</label>
            <input type="text" id="monthly-bill" name="monthly-bill" placeholder="$" required>

            <label for="system-size">Desired System Size</label>
            <select id="system-size" name="system-size">
                <option value="">Select...</option>
                <option value="small">Small (3-5 kW)</option>
                <option value="medium">Medium (6-10 kW)</option>
                <option value="large">Large (11-20 kW)</option>
                <option value="xlarge">Extra Large (20+ kW)</option>
            </select>

            <label for="timeline">Installation Timeline</label>
            <select id="timeline" name="timeline">
                <option value="">Select...</option>
                <option value="asap">As soon as possible</option>
                <option value="1-3months">1-3 months</option>
                <option value="3-6months">3-6 months</option>
                <option value="6+months">6+ months</option>
            </select>

            <label for="comments">Additional Comments</label>
            <textarea id="comments" name="comments" rows="4"></textarea>

            <button type="submit" class="btn-submit">Request Quote</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 SolarTechSolutions. All rights reserved.</p>

    </footer>
</body>
</html>
